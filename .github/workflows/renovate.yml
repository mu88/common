name: Renovate

on:
  schedule:
    - cron: "*/30 6-18 * * 2"
    - cron: "0 */6 * * 0,1,3-6"
  push:
    paths:
      - ".github/workflows/renovate.yml"
      - "renovate/**"
      - "renovate.json5"
  workflow_dispatch:

env:
  RENOVATE_VERSION: "43.150.0"

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate GitHub App token
        id: token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.MU88_BOT_APP_ID }}
          private-key: ${{ secrets.MU88_BOT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Get bot user identity
        id: bot-identity
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          bot_slug="${{ steps.token.outputs.app-slug }}"
          bot_id=$(gh api "/users/${bot_slug}%5Bbot%5D" --jq .id)
          bot_login=$(gh api "/users/${bot_slug}%5Bbot%5D" --jq .login)
          echo "name=$bot_login" >> "$GITHUB_OUTPUT"
          echo "email=${bot_id}+${bot_login}@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - name: Run Renovate
        shell: pwsh
        run: |
          docker run --rm `
            -e "RENOVATE_TOKEN=${{ steps.token.outputs.token }}" `
            -e "RENOVATE_GIT_AUTHOR=${{ steps.bot-identity.outputs.name }} <${{ steps.bot-identity.outputs.email }}>" `
            -e LOG_LEVEL=debug `
            -e LOG_FILE=/tmp/renovate-output.log `
            -e LOG_FILE_LEVEL=debug `
            -e RENOVATE_AUTODISCOVER=true `
            -e 'RENOVATE_AUTODISCOVER_FILTER=["mu88/*"]' `
            -v /tmp:/tmp `
            "ghcr.io/renovatebot/renovate:$env:RENOVATE_VERSION"
          exit $LASTEXITCODE

      - name: Job Summary
        if: always()
        shell: pwsh
        run: .github/scripts/Write-RenovateSummary.ps1 -LogFile /tmp/renovate-output.log
