name: Renovate

on:
  schedule:
    - cron: "*/30 6-18 * * 1"
    - cron: "0 */6 * * 0,2-6"
  push:
    paths:
      - ".github/workflows/renovate.yml"
      - "renovate/**"
      - "renovate.json5"
  workflow_dispatch:

env:
  RENOVATE_VERSION: "43.150.0"

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get bot user identity
        uses: ./.github/actions/get-bot-identity
        id: bot-identity
        with:
          client-id: ${{ vars.MU88_BOT_APP_ID }}
          private-key: ${{ secrets.MU88_BOT_APP_PRIVATE_KEY }}

      - name: Run Renovate
        shell: pwsh
        run: |
          docker run --rm `
            -e "RENOVATE_TOKEN=${{ steps.bot-identity.outputs.token }}" `
            -e "RENOVATE_GIT_AUTHOR=${{ steps.bot-identity.outputs.name }} <${{ steps.bot-identity.outputs.email }}>" `
            -e LOG_LEVEL=debug `
            -e LOG_FILE=/tmp/renovate-output.log `
            -e LOG_FILE_LEVEL=debug `
            -e RENOVATE_AUTODISCOVER=true `
            -e 'RENOVATE_AUTODISCOVER_FILTER=["mu88/*"]' `
            -v /tmp:/tmp `
            "ghcr.io/renovatebot/renovate:$env:RENOVATE_VERSION"
          exit $LASTEXITCODE

      - name: Job Summary
        if: always()
        shell: pwsh
        run: .github/scripts/Write-RenovateSummary.ps1 -LogFile /tmp/renovate-output.log
