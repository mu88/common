name: 'Get GitHub App Bot Identity'
description: 'Retrieve the login and email address for a GitHub App to use in git commits'

inputs:
  client-id:
    description: 'GitHub App Client ID'
    required: true
  private-key:
    description: 'GitHub App private key'
    required: true

outputs:
  name:
    description: 'Bot login name (e.g., mu88-bot[bot])'
    value: ${{ steps.identity.outputs.name }}
  email:
    description: 'Bot email address (e.g., {id}+{login}@users.noreply.github.com)'
    value: ${{ steps.identity.outputs.email }}
  token:
    description: 'Generated GitHub App token'
    value: ${{ steps.token.outputs.token }}
  app-slug:
    description: 'GitHub App slug'
    value: ${{ steps.token.outputs.app-slug }}

runs:
  using: 'composite'
  steps:
    - name: Generate GitHub App token
      id: token
      uses: actions/create-github-app-token@v3.1.1
      with:
        client-id: ${{ inputs.client-id }}
        private-key: ${{ inputs.private-key }}

    - name: Get bot user identity
      id: identity
      shell: bash
      env:
        GH_TOKEN: ${{ steps.token.outputs.token }}
      run: |
        bot_slug="${{ steps.token.outputs.app-slug }}"
        bot_id=$(gh api "/users/${bot_slug}%5Bbot%5D" --jq .id)
        bot_login=$(gh api "/users/${bot_slug}%5Bbot%5D" --jq .login)
        echo "name=$bot_login" >> "$GITHUB_OUTPUT"
        echo "email=${bot_id}+${bot_login}@users.noreply.github.com" >> "$GITHUB_OUTPUT"
